<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="18" fill="#07080e"/>
  <text x="600" y="46" text-anchor="middle" font-size="15" letter-spacing="6" fill="#9aa4b2">COMPONENT MAP</text>

  <!-- Shell apps row -->
  <g font-size="12.5" font-weight="600" fill="#f5f7fa" text-anchor="middle">
    <rect x="90"  y="80" width="150" height="56" rx="10" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/><text x="165" y="106">Dashboard</text><text x="165" y="124" font-size="10" font-weight="400" fill="#9aa4b2">score · timeline · report</text>
    <rect x="270" y="80" width="140" height="56" rx="10" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/><text x="340" y="106">Capsule</text><text x="340" y="124" font-size="10" font-weight="400" fill="#9aa4b2">app store</text>
    <rect x="440" y="80" width="140" height="56" rx="10" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/><text x="510" y="106">Permissions</text><text x="510" y="124" font-size="10" font-weight="400" fill="#9aa4b2">grants · history</text>
    <rect x="610" y="80" width="140" height="56" rx="10" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/><text x="680" y="106">Settings</text><text x="680" y="124" font-size="10" font-weight="400" fill="#9aa4b2">system · privacy</text>
    <rect x="780" y="80" width="150" height="56" rx="10" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/><text x="855" y="106">WiFi · Sound · Update</text><text x="855" y="124" font-size="10" font-weight="400" fill="#9aa4b2">everyday controls</text>
    <rect x="960" y="80" width="150" height="56" rx="10" fill="#0f141a" stroke="#16c784" stroke-width="1.5"/><text x="1035" y="106">Firefox</text><text x="1035" y="124" font-size="10" font-weight="400" fill="#16c784">bubblewrap sandbox</text>
  </g>
  <text x="60" y="112" font-size="11" letter-spacing="3" fill="#5b6675" transform="rotate(-90 60 112)">APPS</text>

  <!-- Plasma shell band -->
  <rect x="90" y="176" width="1020" height="70" rx="12" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/>
  <path d="M120 226 L134 202 L148 226 Z" fill="none" stroke="#16c784" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="600" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f7fa">ArkaWM — KDE Plasma, branded</text>
  <text x="600" y="228" text-anchor="middle" font-size="11.5" fill="#9aa4b2">top panel · floating dock · full-screen launcher · SDDM login · Plymouth splash · design system everywhere</text>

  <!-- arkad band -->
  <rect x="90" y="286" width="1020" height="90" rx="12" fill="#0f141a" stroke="#16c784" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;0.35;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="130" cy="331" r="8" fill="#16c784" filter="url(#g)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f7fa">arkad — the privacy core (Rust, static)</text>
  <text x="600" y="341" text-anchor="middle" font-size="11.5" fill="#9aa4b2">MAC randomization · encrypted DNS (DoT) · hostname · IPv6 privacy · sandbox integrity</text>
  <text x="600" y="362" text-anchor="middle" font-size="11" fill="#5b6675">D-Bus: org.arka.arkad — PrivacyScore · typed status enums · EnforceAll() · events → privacy.jsonl</text>

  <!-- D-Bus arrows apps<->arkad -->
  <g stroke="#2e7bff" stroke-width="1.5" opacity="0.65">
    <line x1="165" y1="136" x2="165" y2="176"/><line x1="165" y1="246" x2="165" y2="286"/>
    <line x1="510" y1="136" x2="510" y2="176"/><line x1="510" y1="246" x2="510" y2="286"/>
  </g>
  <g fill="#2e7bff">
    <circle r="2.8"><animateMotion path="M165 286 L165 246" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle r="2.8"><animateMotion path="M165 176 L165 136" dur="1.8s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle r="2.8"><animateMotion path="M510 136 L510 176" dur="1.8s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.9s" repeatCount="indefinite"/></circle>
  </g>
  <text x="185" y="165" font-size="10" fill="#2e7bff" opacity="0.8">D-Bus</text>

  <!-- platform band -->
  <rect x="90" y="416" width="1020" height="64" rx="12" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/>
  <text x="600" y="443" text-anchor="middle" font-size="14" font-weight="700" fill="#f5f7fa">Immutable platform — bootc · composefs (read-only root) · atomic updates · rollback · TPM PCRs 0–10</text>
  <text x="600" y="466" text-anchor="middle" font-size="11" fill="#9aa4b2">one Containerfile declares every byte — reproducible, diffable, un-tamperable at runtime</text>

  <!-- kernel -->
  <rect x="90" y="500" width="1020" height="40" rx="12" fill="#050609" stroke="#1e2630" stroke-width="1.5"/>
  <text x="600" y="525" text-anchor="middle" font-size="12.5" fill="#9aa4b2">Linux kernel (Fedora 42) → hardware</text>
</svg>
