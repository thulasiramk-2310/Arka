<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="18" fill="#07080e"/>
  <text x="600" y="52" text-anchor="middle" font-size="15" letter-spacing="6" fill="#9aa4b2">FROM ONE IMAGE, EVERYTHING</text>

  <!-- Source node -->
  <g>
    <rect x="80" y="150" width="230" height="120" rx="14" fill="#0f141a" stroke="#16c784" stroke-width="1.5"/>
    <text x="195" y="196" text-anchor="middle" font-size="17" font-weight="700" fill="#f5f7fa">Container Image</text>
    <text x="195" y="220" text-anchor="middle" font-size="12" fill="#9aa4b2">Containerfile — the OS,</text>
    <text x="195" y="238" text-anchor="middle" font-size="12" fill="#9aa4b2">every byte declared</text>
  </g>

  <!-- builder node -->
  <g>
    <rect x="390" y="165" width="190" height="90" rx="14" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/>
    <text x="485" y="203" text-anchor="middle" font-size="15" font-weight="600" fill="#f5f7fa">bootc-image-builder</text>
    <text x="485" y="226" text-anchor="middle" font-size="11.5" fill="#9aa4b2">deploys, doesn't install</text>
  </g>

  <!-- artifacts -->
  <g>
    <rect x="660" y="70" width="160" height="64" rx="12" fill="#0f141a" stroke="#16c784" stroke-width="1.5"/>
    <text x="740" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#f5f7fa">QCOW2</text>
    <text x="740" y="118" text-anchor="middle" font-size="11" fill="#16c784">DP1 · shipping</text>

    <rect x="660" y="178" width="160" height="64" rx="12" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/>
    <text x="740" y="206" text-anchor="middle" font-size="14" font-weight="600" fill="#9aa4b2">RAW</text>
    <text x="740" y="226" text-anchor="middle" font-size="11" fill="#5b6675">DP2 · hardware</text>

    <rect x="660" y="286" width="160" height="64" rx="12" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/>
    <text x="740" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#9aa4b2">Live ISO</text>
    <text x="740" y="334" text-anchor="middle" font-size="11" fill="#5b6675">DP2 · installer</text>
  </g>

  <!-- OOBE / desktop -->
  <g>
    <rect x="900" y="150" width="220" height="120" rx="14" fill="#0f141a" stroke="#1e2630" stroke-width="1.5"/>
    <rect x="900" y="150" width="220" height="120" rx="14" fill="none" stroke="#16c784" stroke-width="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="1010" y="192" text-anchor="middle" font-size="16" font-weight="700" fill="#f5f7fa">Welcome → Desktop</text>
    <text x="1010" y="216" text-anchor="middle" font-size="11.5" fill="#9aa4b2">one OOBE wizard,</text>
    <text x="1010" y="234" text-anchor="middle" font-size="11.5" fill="#9aa4b2">identical on every path</text>
  </g>

  <!-- connectors -->
  <g stroke="#1e2630" stroke-width="2" fill="none">
    <path d="M310 210 H390"/>
    <path d="M580 210 C620 210 620 102 660 102"/>
    <path d="M580 210 H660"/>
    <path d="M580 210 C620 210 620 318 660 318"/>
    <path d="M820 102 C860 102 860 210 900 210"/>
    <path d="M820 210 H900"/>
    <path d="M820 318 C860 318 860 210 900 210"/>
  </g>

  <!-- particles on active DP1 path -->
  <g fill="#16c784" filter="url(#g)">
    <circle r="3.4"><animateMotion path="M310 210 H390" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.4s" repeatCount="indefinite"/></circle>
    <circle r="3.4"><animateMotion path="M580 210 C620 210 620 102 660 102" dur="1.4s" begin="0.45s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.45s" repeatCount="indefinite"/></circle>
    <circle r="3.4"><animateMotion path="M820 102 C860 102 860 210 900 210" dur="1.4s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.9s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="396" text-anchor="middle" font-size="12" fill="#5b6675">however the bits land on disk, the system that boots is byte-identical</text>
</svg>
