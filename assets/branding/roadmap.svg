<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" rx="18" fill="#07080e"/>
  <text x="600" y="52" text-anchor="middle" font-size="15" letter-spacing="6" fill="#9aa4b2">ROADMAP</text>

  <!-- track -->
  <line x1="140" y1="150" x2="1060" y2="150" stroke="#1e2630" stroke-width="3"/>
  <line x1="140" y1="150" x2="240" y2="150" stroke="#16c784" stroke-width="3"/>

  <!-- DP1 (current) -->
  <circle cx="140" cy="150" r="16" fill="#07080e" stroke="#16c784" stroke-width="3" filter="url(#g)"/>
  <circle cx="140" cy="150" r="7" fill="#16c784">
    <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="140" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#16c784">DP1</text>
  <text x="140" y="222" text-anchor="middle" font-size="11" fill="#9aa4b2">qcow2 · QEMU</text>
  <text x="140" y="240" text-anchor="middle" font-size="11" fill="#16c784">← you are here</text>

  <!-- DP2 -->
  <circle cx="370" cy="150" r="13" fill="#07080e" stroke="#2e7bff" stroke-width="2.5"/>
  <text x="370" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#f5f7fa">DP2</text>
  <text x="370" y="222" text-anchor="middle" font-size="11" fill="#9aa4b2">real hardware · raw + live ISO</text>
  <text x="370" y="240" text-anchor="middle" font-size="11" fill="#5b6675">thin Arka installer</text>

  <!-- Beta -->
  <circle cx="600" cy="150" r="13" fill="#07080e" stroke="#1e2630" stroke-width="2.5"/>
  <text x="600" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#f5f7fa">Beta</text>
  <text x="600" y="222" text-anchor="middle" font-size="11" fill="#9aa4b2">trusted testers · hardware matrix</text>
  <text x="600" y="240" text-anchor="middle" font-size="11" fill="#5b6675">"use this computer"</text>

  <!-- RC -->
  <circle cx="830" cy="150" r="13" fill="#07080e" stroke="#1e2630" stroke-width="2.5"/>
  <text x="830" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#f5f7fa">RC</text>
  <text x="830" y="222" text-anchor="middle" font-size="11" fill="#9aa4b2">bugs + polish only</text>

  <!-- 1.0 -->
  <circle cx="1060" cy="150" r="13" fill="#07080e" stroke="#1e2630" stroke-width="2.5"/>
  <path d="M1052 150 l6 6 10 -12" stroke="#5b6675" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1060" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#f5f7fa">1.0</text>
  <text x="1060" y="222" text-anchor="middle" font-size="11" fill="#9aa4b2">privacy, effortless</text>

  <!-- traveling pulse -->
  <circle r="4" fill="#16c784" filter="url(#g)">
    <animateMotion path="M140 150 H240" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>
